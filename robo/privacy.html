
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacy Policy — Sultan AI</title>
    <meta name="description" content="Privacy Policy for Sultan AI, an omnichannel AI chatbot platform by PT Akshaya Mulia Asha.">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'Chillax';
            src: url('fonts/Chillax-Medium.otf') format('opentype');
            font-weight: 500;
            font-style: normal;
            font-display: swap;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --coral: #FF6647;
            --coral-hover: #E85535;
            --blue: #116AF8;
            --text: #1A1A1A;
            --text-muted: #6B7280;
            --text-light: #9CA3AF;
            --border: #E5E7EB;
            --surface: #FFFFFF;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
            --radius: 12px;
            --max-w: 1120px;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
            color: var(--text); line-height: 1.6; -webkit-font-smoothing: antialiased;
            background: #FFFFFF;
        }

        h1, h2, h3 { font-family: 'Chillax', 'Plus Jakarta Sans', sans-serif; line-height: 1.15; letter-spacing: -0.02em; font-weight: 500; }
        a { text-decoration: none; color: inherit; }

        /* ===== NAVBAR ===== */
        .navbar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            background: rgba(255,255,255,0.88); backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(0,0,0,0.05); padding: 0 24px;
        }
        .navbar-inner {
            max-width: var(--max-w); margin: 0 auto;
            display: flex; align-items: center; justify-content: space-between; height: 64px;
        }
        .logo { display: flex; align-items: center; }
        .logo img { height: 28px; width: auto; }
        .nav-links { display: flex; align-items: center; gap: 36px; list-style: none; }
        .nav-links a { font-size: 0.9375rem; font-weight: 500; color: var(--text-muted); transition: color 0.2s; }
        .nav-links a:hover { color: var(--text); }
        .nav-cta { color: var(--coral) !important; font-weight: 600 !important; }
        .mobile-toggle { display: none; background: none; border: none; cursor: pointer; padding: 12px; -webkit-tap-highlight-color: transparent; }
        .mobile-toggle span { display: block; width: 20px; height: 2px; background: var(--text); margin: 5px 0; }

      
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar" id="navbar">
    <div class="navbar-inner">
        <a href="/" class="logo"><img src="logo.png" alt="Sultan AI"></a>
        <ul class="nav-links" id="navLinks">
            <li><a href="/#features">Features</a></li>
            <li><a href="/#pricing">Pricing</a></li>
            <li><a href="/#faq">FAQ</a></li>
            <li><a href="https://wa.me/6281994565275?text=Hi%20Sultan%20AI%2C%20saya%20tertarik%20untuk%20konsultasi!" target="_blank" class="nav-cta">Consult Now</a></li>
        </ul>
        <button class="mobile-toggle" id="mobileToggle" aria-label="Toggle menu"><span></span><span></span><span></span></button>
    </div>
</nav>

<!-- FOOTER -->
<footer class="footer">
    <div class="footer-inner">
        <div class="footer-bottom">
            <span>&copy; 2026 PT Akshaya Mulia Asha. All rights reserved.</span>
            <div><a href="/privacy.html">Privacy Policy</a><a href="/" style="margin-left:16px;">Home</a></div>
        </div>
    </div>
</footer>

<script>
    window.addEventListener('scroll', () => document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 10));
    document.getElementById('mobileToggle').addEventListener('click', () => document.getElementById('navLinks').classList.toggle('open'));
    document.querySelectorAll('.nav-links a').forEach(l => l.addEventListener('click', () => document.getElementById('navLinks').classList.remove('open')));
</script>
<script>
(function(){
    var p = new URLSearchParams(window.location.search).get('ref');
    if (p) {
        var d = new Date(); d.setTime(d.getTime() + 90*24*60*60*1000);
        document.cookie = '_sa_ref_code=' + encodeURIComponent(p.toLowerCase()) + '; expires=' + d.toUTCString() + '; path=/; SameSite=Lax';
    }
    var m = document.cookie.match(/_sa_ref_code=([^;]+)/);
    if (!m) return;
    var code = decodeURIComponent(m[1]).toUpperCase();
    var tag = encodeURIComponent(' [REF-' + code + ']');
    document.querySelectorAll('a[href*="wa.me/"]').forEach(function(a){
        var h = a.href;
        if (h.indexOf('text=') !== -1) a.href = h + tag;
        else if (h.indexOf('?') !== -1) a.href = h + '&text=' + tag;
        else a.href = h + '?text=' + tag;
    });
})();
</script>

</body>
</html>
